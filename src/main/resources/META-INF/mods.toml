authors="${mod_authors}"
displayURL="${mod_display_url}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
modId="forge"
mandatory=true
versionRange="${forge_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="geckolib"
mandatory=true
versionRange="[4.4.9,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="smartbrainlib"
mandatory=true
versionRange="[1.14.1,)"
ordering="AFTER"
side="BOTH"
